<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KHÁCH HÀNG THÂN THIẾT 2026</title>
<style>
*{ box-sizing:border-box; }
body{ font-family:Arial,sans-serif; background:#f3f3f3; padding:20px; margin:0; color:#111; }
.container{ max-width:950px; margin:auto; background:white; padding:32px; border-radius:24px; box-shadow:0 8px 30px rgba(0,0,0,0.08); }
.header{ text-align:center; margin-bottom:40px; }
.logo{ width:180px; max-width:100%; object-fit:contain; margin-bottom:18px; }
h1{ font-size:42px; margin:0; font-weight:700; }
h2{ margin-top:40px; margin-bottom:20px; font-size:28px; }
label{ display:block; font-weight:600; margin-bottom:8px; }
.optional{ font-size:13px; font-weight:400; color:#888; margin-left:6px; }
input, textarea, select{
  width:100%; padding:14px; border:1px solid #dcdcdc; border-radius:12px;
  font-size:16px; margin-bottom:20px; background:white;
  appearance:none; -webkit-appearance:none;
}
textarea{ min-height:120px; resize:vertical; }
.required{ color:red; }
.address-grid{ display:grid; grid-template-columns:1fr 1fr; gap:0 20px; }
.product-checkbox{
  display:flex; align-items:center; padding:16px 20px; margin-bottom:14px;
  border-radius:14px; border:1px solid #e2e2e2; background:#fafafa;
  transition:0.2s ease; cursor:pointer;
}
.product-checkbox:hover{ background:#f0f0f0; }
.product-checkbox.selected{ background:#111; border-color:#111; color:white; }
.product-checkbox.selected:hover{ background:#222; }
.product-checkbox.selected span{ color:#aaa !important; }
.product-checkbox input[type="checkbox"]{ width:22px; height:22px; cursor:pointer; flex-shrink:0; accent-color:#fff; }
.product-block{ border:1px solid #e3e3e3; padding:24px; border-radius:18px; margin-top:18px; display:none; background:#fafafa; }
.product-block-header{ margin-bottom:16px; }
.product-block-code{ font-size:13px; font-weight:700; color:#888; letter-spacing:0.5px; text-transform:uppercase; margin-bottom:4px; }
.product-block-name{ font-size:22px; font-weight:bold; color:#111; margin-bottom:4px; }
.product-block-price{ font-size:17px; color:#444; font-weight:500; }
.color-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:20px; margin-top:16px; }
.total{ font-size:42px; font-weight:bold; margin-top:50px; text-align:center; }
.qr-section{ text-align:center; margin-top:50px; margin-bottom:50px; }
.qr-image{ width:520px; max-width:100%; border-radius:24px; box-shadow:0 8px 30px rgba(0,0,0,0.12); }
.note{ font-size:14px; color:#666; line-height:1.7; margin-top:14px; }
button{ background:black; color:white; padding:18px; border:none; border-radius:14px; font-size:18px; font-weight:bold; cursor:pointer; width:100%; margin-top:30px; transition:0.2s; }
button:hover{ opacity:0.92; }
button:disabled{ opacity:0.7; cursor:not-allowed; }
@media(max-width:768px){
  .container{ padding:22px; }
  h1{ font-size:28px; }
  h2{ font-size:22px; }
  .total{ font-size:32px; }
  .logo{ width:140px; }
  .address-grid{ grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <img src="https://raw.githubusercontent.com/haiaunt195-prog/INNOYO-khach-hang-than-thien-2026/main/Logo%20INNO%20-%20Black.png" class="logo" alt="INNO Logo"/>
  <h1>INNOYO KHÁCH HÀNG THÂN THIẾT 2026</h1>
</div>

<label>Họ và tên <span class="required">*</span></label>
<input id="name" placeholder="Nguyễn Văn A"/>

<label>Số điện thoại liên hệ <span class="required">*</span></label>
<input id="phone" type="tel" placeholder="0901234567"/>

<label>Email <span class="optional">(không bắt buộc)</span></label>
<input type="email" id="email" placeholder="example@gmail.com"/>

<h2>Địa chỉ nhận hàng <span class="required">*</span></h2>

<label>Số nhà, tên đường <span class="required">*</span></label>
<input id="street" placeholder="Ví dụ: 123 Nguyễn Trãi"/>

<div class="address-grid">
  <div>
    <label>Tỉnh / Thành phố <span class="required">*</span></label>
    <input id="province" placeholder="Ví dụ: TP. Hồ Chí Minh"/>
  </div>
  <div>
    <label>Quận / Huyện <span class="required">*</span></label>
    <input id="district" placeholder="Ví dụ: Quận 7"/>
  </div>
</div>

<label>Phường / Xã <span class="required">*</span></label>
<input id="ward" placeholder="Ví dụ: Phường Tân Phong"/>

<h2>Sản phẩm muốn mua <span class="required">*</span></h2>
<div id="product-list"></div>
<div id="product-blocks"></div>

<div class="total">Tổng tiền: <span id="total">0</span> VNĐ</div>

<div class="qr-section">
  <h2>QR Thanh toán</h2>
  <p class="note">
    Vui lòng chuyển đúng số tiền kèm note "Họ tên" hoặc "Số điện thoại"<br/>
    và upload bill chuyển khoản bên dưới.
  </p>
  <img src="https://raw.githubusercontent.com/haiaunt195-prog/INNOYO-khach-hang-than-thien-2026/main/QR%20code-inno%20noi%20bo.png" class="qr-image"/>
</div>

<h2>Upload bill chuyển khoản <span class="required">*</span></h2>
<input type="file" id="paymentProof" accept="image/*"/>

<button onclick="submitOrder()">Gửi đơn hàng</button>

</div>

<script>
const CLOUDINARY_CLOUD_NAME = "ddpsybbri";
const CLOUDINARY_UPLOAD_PRESET = "inno_upload";
const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwRJfbMdbj6IPyTWcd7inPplD-_77nVGsTPM8Url5cyGXpLcKWqutssT84I6hTo9omM/exec";

const products = [
  { code:"INNO-B001", name:"Quạt InnoFans Handheld", price:239000, colors:["Bạc","Đen","Vàng"] },
  { code:"INNO-B015", name:"Quạt Innoyo Fan Air", price:299000, colors:["Hồng","Trắng","Tím"] },
  { code:"INNO-B003", name:"Quạt InnoFans Ice", price:259000, colors:["Trắng","Tím","Hồng"] },
  { code:"INNO-B009", name:"Quạt InnoFans Ice Pro", price:329000, colors:["Xám","Vàng","Đen"] },
  { code:"INNO-B008", name:"Tăm nước Innoyo Water Flosser", price:569000, colors:["Hồng","Xanh"] },
  { code:"INNO-B007", name:"Tăm nước mini InnoCare Water Flosser Pocket", price:599000, colors:["Trắng"] }
];

const productList = document.getElementById("product-list");
const productBlocks = document.getElementById("product-blocks");

products.forEach((p, index) => {
  const checkbox = document.createElement("div");
  checkbox.className = "product-checkbox";
  checkbox.id = `card-${index}`;
  checkbox.onclick = (e) => {
    if (e.target.type === "checkbox") return;
    const cb = document.getElementById(`check-${index}`);
    cb.checked = !cb.checked;
    toggleProduct(index);
  };
  checkbox.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;width:100%;">
      <input type="checkbox" id="check-${index}" onchange="toggleProduct(${index})"/>
      <label for="check-${index}" style="margin:0;cursor:pointer;line-height:1.5;">
        <b>${p.code}</b> - ${p.name}
        <span style="color:#666;font-weight:400;">(${p.price.toLocaleString()}đ)</span>
      </label>
    </div>
  `;
  productList.appendChild(checkbox);

  const block = document.createElement("div");
  block.className = "product-block";
  block.id = `product-${index}`;

  let colorsHTML = "";
  p.colors.forEach(color => {
    colorsHTML += `
      <div>
        <label>${color}</label>
        <input type="number" min="0" placeholder="Nhập số lượng" value="" disabled
          id="${p.code}_${color}" oninput="calculateTotal()"/>
      </div>
    `;
  });

  block.innerHTML = `
    <div class="product-block-header">
      <div class="product-block-code">${p.code}</div>
      <div class="product-block-name">${p.name}</div>
      <div class="product-block-price">${p.price.toLocaleString()}đ</div>
    </div>
    <div class="color-grid">${colorsHTML}</div>
  `;
  productBlocks.appendChild(block);
});

function toggleProduct(index) {
  const checked = document.getElementById(`check-${index}`).checked;
  const block = document.getElementById(`product-${index}`);
  const card = document.getElementById(`card-${index}`);
  block.style.display = checked ? "block" : "none";
  checked ? card.classList.add("selected") : card.classList.remove("selected");
  const product = products[index];
  product.colors.forEach(color => {
    const input = document.getElementById(`${product.code}_${color}`);
    input.disabled = !checked;
    if (!checked) input.value = "";
  });
  calculateTotal();
}

function calculateTotal() {
  let total = 0;
  products.forEach(p => {
    p.colors.forEach(color => {
      const input = document.getElementById(`${p.code}_${color}`);
      if (input) total += parseInt(input.value || 0) * p.price;
    });
  });
  document.getElementById("total").innerText = total.toLocaleString();
}

async function compressImage(file) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = (event) => {
      const img = new Image();
      img.src = event.target.result;
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX_WIDTH = 1000;
        const scale = MAX_WIDTH / img.width;
        canvas.width = MAX_WIDTH;
        canvas.height = img.height * scale;
        canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob((blob) => resolve(blob), "image/jpeg", 0.7);
      };
    };
  });
}

async function uploadToCloudinary(file) {
  const compressed = await compressImage(file);
  const formData = new FormData();
  formData.append("file", compressed, "bill.jpg");
  formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method:"POST", body:formData });
  const data = await res.json();
  return data.secure_url;
}

async function submitOrder() {
  const button = document.querySelector("button");
  const fullName = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const street = document.getElementById("street").value.trim();
  const province = document.getElementById("province").value.trim();
  const district = document.getElementById("district").value.trim();
  const ward = document.getElementById("ward").value.trim();

  if (!fullName || !phone) { alert("Vui lòng nhập họ tên và số điện thoại"); return; }
  if (!street || !province || !district || !ward) { alert("Vui lòng nhập đầy đủ địa chỉ nhận hàng"); return; }

  const address = `${street}, ${ward}, ${district}, ${province}`;

  const items = [];
  try {
    products.forEach((p, index) => {
      const checked = document.getElementById(`check-${index}`).checked;
      if (!checked) return;
      let hasQty = false;
      p.colors.forEach(color => {
        const input = document.getElementById(`${p.code}_${color}`);
        const qty = parseInt(input.value || 0);
        if (qty > 0) { hasQty = true; items.push({ product:`${p.code} - ${p.name}`, color, qty, price:p.price, total:qty*p.price }); }
      });
      if (!hasQty) throw new Error(`Vui lòng nhập số lượng cho ${p.name}`);
    });
  } catch(e) { alert(e.message); return; }

  if (items.length === 0) { alert("Vui lòng chọn sản phẩm"); return; }

  const file = document.getElementById("paymentProof").files[0];
  if (!file) { alert("Vui lòng upload bill chuyển khoản"); return; }

  try {
    button.disabled = true;
    button.innerText = "Đang upload bill...";
    const paymentImage = await uploadToCloudinary(file);
    button.innerText = "Đang gửi đơn hàng...";
    const payload = { fullName, phone, email, address, total: document.getElementById("total").innerText.replace(/,/g,""), paymentImage, items };
    await fetch(GOOGLE_SCRIPT_URL, { method:"POST", body:JSON.stringify(payload) });
    button.innerText = "Đặt hàng thành công ✓";
    alert("Đặt hàng thành công!");
    location.reload();
  } catch(error) {
    console.error(error);
    alert(error.message || "Có lỗi xảy ra, vui lòng thử lại");
    button.disabled = false;
    button.innerText = "Gửi đơn hàng";
  }
}
</script>
</body>
</html>
